name: vps-8642-direct
on:
  workflow_dispatch:

jobs:
  direct:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      VPS_SSH_USER: ${{ secrets.VPS_USER }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
    steps:
      - name: Prepare SSH key and config
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config <<'EOF'
          Host vps
            HostName ${VPS_HOST}
            User ${VPS_SSH_USER}
            Port ${SSH_PORT}
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
          echo 'SSH_CONFIG:'
          cat ~/.ssh/config
      - name: Run ufw + ss over SSH
        run: |
          set -o pipefail
          ssh -o BatchMode=yes -o IdentitiesOnly=yes vps 'sudo ufw allow 8642/tcp && echo UFW_OK' | tee /tmp/ufw.out || true
          ssh -o BatchMode=yes -o IdentitiesOnly=yes vps 'ss -tlnp | grep 8642 || true' | tee /tmp/ss.out || true
      - name: Print output
        run: |
          echo '--- UFW ---'
          cat /tmp/ufw.out 2>/dev/null || true
          echo '--- SS ---'
          cat /tmp/ss.out 2>/dev/null || true
